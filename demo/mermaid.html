<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mermaid Diagrams - SpaceGraphJS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    .mermaid-input-panel {
      position: fixed;
      top: 60px;
      left: 16px;
      width: 320px;
      max-height: calc(100vh - 120px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    .mermaid-input-panel h2 {
      font-size: 14px;
      color: #8b5cf6;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .mermaid-input-panel textarea {
      width: 100%;
      height: 200px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      padding: 12px;
      resize: none;
      line-height: 1.5;
    }

    .mermaid-input-panel textarea:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    .example-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .example-buttons button {
      padding: 6px 10px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid #8b5cf6;
      border-radius: 6px;
      color: #c4b5fd;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-buttons button:hover {
      background: rgba(139, 92, 246, 0.3);
      color: #fff;
    }

    .render-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .render-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }

    .mermaid-stats {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 12px;
      color: #94a3b8;
      z-index: 1000;
    }

    .mermaid-stats span {
      color: #8b5cf6;
      font-weight: 600;
    }

    .demo-title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      z-index: 1000;
    }

    .demo-title span {
      color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="demo-title">
    <span>Mermaid</span> Diagram Renderer
  </div>

  <div id="container"></div>

  <div class="mermaid-input-panel">
    <h2>Mermaid Code</h2>
    <textarea id="mermaid-code" placeholder="Enter Mermaid diagram code...">graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Process 1]
    B -->|No| D[Process 2]
    C --> E((End))
    D --> E</textarea>

    <div class="example-buttons">
      <button onclick="loadExample('flowchart')">Flowchart</button>
      <button onclick="loadExample('decision')">Decision Tree</button>
      <button onclick="loadExample('process')">Process Flow</button>
      <button onclick="loadExample('ierarchy')">Hierarchy</button>
      <button onclick="loadExample('cycle')">Cycle</button>
      <button onclick="loadExample('complex')">Complex</button>
    </div>

    <button class="render-button" onclick="renderDiagram()">Render Diagram</button>
  </div>

  <div class="mermaid-stats">
    Nodes: <span id="node-count">0</span> | Edges: <span id="edge-count">0</span> | Layout: <span id="current-layout">Hierarchical</span>
  </div>

  <script type="module">
    import {
      SpaceGraph,
      MermaidPlugin,
      MinimapPlugin,
      HUDPlugin,
      injectMermaidStyles,
    } from '@src/index.ts';

    injectMermaidStyles();

    const EXAMPLES = {
      flowchart: `graph TD
      A[Start] --> B{Decision}
      B -->|Yes| C[Process 1]
      B -->|No| D[Process 2]
      C --> E((End))
      D --> E`,

      decision: `graph TD
      A{Is it working?}
      A -->|Yes| B[Great!]
      A -->|No| C[Debug]
      C --> D{Fixed?}
      D -->|Yes| B
      D -->|No| E[Ask for help]
      E --> C`,

      process: `graph LR
      A[Design] --> B[Implement]
      B --> C[Test]
      C --> D{Approved?}
      D -->|Yes| E[Deploy]
      D -->|No| B`,

      hierarchy: `graph TB
      A[CEO] --> B[CTO]
      A --> C[CFO]
      A --> D[COO]
      B --> E[Engineering]
      B --> F[Product]
      C --> G[Finance]
      D --> H[Operations]`,

      cycle: `graph LR
      A[Plan] --> B[Execute]
      B --> C[Review]
      C -->|Good| D[Complete]
      C -->|Bad| A`,

      complex: `graph TD
      subgraph Input
        A[User Request]
      end
      A --> B{Valid?}
      B -->|No| C[Error Handler]
      C --> A
      B -->|Yes| D[Process]
      D --> E[Database]
      E --> F{Cache?}
      F -->|Yes| G[Return Cached]
      F -->|No| H[Compute]
      H --> I[Update Cache]
      I --> G
      G --> J((Response))`,
    };

    let sg = null;
    let mermaidPlugin = null;
    let currentLayout = 'hierarchical';

    const LAYOUT_LABELS = {
      force: 'Force Directed',
      circular: 'Circular',
      grid: 'Grid',
      hierarchical: 'Hierarchical',
      radial: 'Radial',
      tree: 'Tree',
      spectral: 'Spectral',
      cluster: 'Cluster',
    };

    async function init() {
      const initialCode = document.getElementById('mermaid-code').value;

      sg = await SpaceGraph.create('#container', {
        nodes: [],
        edges: [],
      });

      mermaidPlugin = new MermaidPlugin({
        defaultLayout: 'hierarchical',
        defaultTheme: 'default',
        showHud: true,
      });

      sg.pluginManager.register('MermaidPlugin', mermaidPlugin);
      mermaidPlugin.init(sg, sg.graph, sg.events);

      const minimap = new MinimapPlugin({ position: 'bottom-right', size: 160 });
      sg.pluginManager.register('MinimapPlugin', minimap);
      minimap.init(sg, sg.graph, sg.events);

      renderDiagram();
    }

    window.loadExample = function(name) {
      const code = EXAMPLES[name];
      if (code) {
        document.getElementById('mermaid-code').value = code;
        renderDiagram();
      }
    };

    window.renderDiagram = function() {
      const code = document.getElementById('mermaid-code').value;
      if (mermaidPlugin && code.trim()) {
        mermaidPlugin.parseAndRender(code);

        setTimeout(() => {
          updateStats();
        }, 500);
      }
    };

    function updateStats() {
      if (!sg) return;
      const nodes = sg.graph.getNodeCount();
      const edges = sg.graph.getEdgeCount();
      document.getElementById('node-count').textContent = nodes;
      document.getElementById('edge-count').textContent = edges;
      document.getElementById('current-layout').textContent = LAYOUT_LABELS[currentLayout] || currentLayout;
    }

    init().catch(console.error);
  </script>
</body>
</html>
