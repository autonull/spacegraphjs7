<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SpaceGraphJS</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0d0d0d;
                color: #eee;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                overflow: hidden;
            }
            #menu {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 40px;
                background: #111;
                border-bottom: 1px solid #222;
                display: flex;
                align-items: center;
                padding: 0 16px;
                gap: 8px;
                z-index: 10000;
            }
            #menu select {
                background: #1a1a1a;
                border: 1px solid #333;
                color: #ccc;
                padding: 6px 12px;
                border-radius: 4px;
                font-size: 13px;
                cursor: pointer;
            }
            #menu select:hover {
                border-color: #8b5cf6;
            }
            #app {
                width: 100vw;
                height: calc(100vh - 40px);
                margin-top: 40px;
            }
        </style>
    </head>
    <body>
        <div id="menu">
            <select id="demo-select"></select>
            <span id="demo-title" style="color: #666; font-size: 12px; margin-left: 8px"></span>
        </div>
        <div id="app"></div>

        <script type="module">
            const DEMOS = import.meta.glob('./demos/*.ts', { eager: true });

            const demoList = Object.keys(DEMOS).map((path) => {
                const name = path.replace('./demos/', '').replace('.ts', '');
                const mod = DEMOS[path];
                return { name, create: mod.default || mod };
            });

            let currentDemo = null;

            const select = document.getElementById('demo-select');
            const title = document.getElementById('demo-title');

            demoList.forEach((d, i) => {
                const opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = d.name;
                select.appendChild(opt);
            });

            async function loadDemo(index) {
                const demo = demoList[index];
                if (!demo) return;

                title.textContent = demo.name;

                document.getElementById('app').innerHTML = '';

                if (currentDemo?.stop) {
                    currentDemo.stop();
                }
                if (currentDemo?.dispose) {
                    currentDemo.dispose();
                }

                currentDemo = await demo.create();
            }

            select.addEventListener('change', (e) => {
                loadDemo(parseInt(e.target.value));
            });

            loadDemo(0);
        </script>
    </body>
</html>
