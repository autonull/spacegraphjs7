<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SpaceGraphJS Demos</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #0d0d0d;
                color: #eee;
                min-height: 100vh;
            }
            header {
                padding: 20px 30px;
                border-bottom: 1px solid #222;
                background: #111;
            }
            h1 {
                font-size: 24px;
                font-weight: 500;
                color: #8b5cf6;
            }
            .subtitle {
                font-size: 13px;
                color: #666;
                margin-top: 4px;
            }
            #demo-selector {
                padding: 20px 30px;
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                border-bottom: 1px solid #222;
            }
            #demo-selector button {
                padding: 10px 16px;
                background: #1a1a1a;
                border: 1px solid #333;
                color: #ccc;
                cursor: pointer;
                border-radius: 4px;
                font-size: 13px;
                transition: all 0.2s;
            }
            #demo-selector button:hover {
                background: #252525;
                border-color: #8b5cf6;
                color: #fff;
            }
            #demo-selector button.active {
                background: #8b5cf6;
                border-color: #8b5cf6;
                color: #fff;
            }
            #app {
                width: 100%;
                height: calc(100vh - 130px);
            }
            .instructions {
                padding: 12px 30px;
                background: #111;
                border-top: 1px solid #222;
                font-size: 12px;
                color: #666;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>SpaceGraphJS Demos</h1>
            <div class="subtitle">SG_ALIGN Unified Architecture</div>
        </header>
        <div id="demo-selector"></div>
        <div id="app"></div>
        <div class="instructions">
            <strong>Controls:</strong> Left drag = orbit / drag node | Middle drag = pan | Right
            drag = zoom | Shift+drag = box select | Alt+drag = create edge
        </div>

        <script type="module">
            const DEMOS = import.meta.glob('./demos/*.ts', { eager: true });

            const demoList = Object.keys(DEMOS).map((path) => {
                const name = path.replace('./demos/', '').replace('.ts', '');
                return { name, path };
            });

            let currentDemo = null;
            let demoInstance = null;

            async function loadDemo(demo) {
                if (demoInstance) {
                    demoInstance.stop?.();
                    demoInstance = null;
                }
                document.getElementById('app').innerHTML = '';

                const mod = DEMOS[demo.path];
                demoInstance = mod.default?.() || mod.create?.() || mod;
            }

            function renderSelector() {
                const container = document.getElementById('demo-selector');
                container.innerHTML = demoList
                    .map(
                        (d) =>
                            `<button data-demo="${d.name}" data-path="${d.path}">${d.name}</button>`,
                    )
                    .join('');

                container.querySelectorAll('button').forEach((btn) => {
                    btn.addEventListener('click', async () => {
                        container
                            .querySelectorAll('button')
                            .forEach((b) => b.classList.remove('active'));
                        btn.classList.add('active');
                        const path = btn.dataset.path;
                        const demo = demoList.find((d) => d.path === path);
                        await loadDemo(demo);
                    });
                });
            }

            renderSelector();
            loadDemo(demoList[0]);
        </script>
    </body>
</html>
