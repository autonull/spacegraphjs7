<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SpaceGraphJS Instanced Demo</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                overflow: hidden;
                background: #1a1a2e;
            }
            #container {
                width: 100vw;
                height: 100vh;
            }
            #status {
                position: fixed;
                top: 10px;
                left: 10px;
                background: rgba(0, 0, 0, 0.8);
                color: #0f0;
                padding: 10px;
                font-family: monospace;
                font-size: 12px;
                z-index: 1000;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <div id="status">SpaceGraphJS Instanced Demo - Loading...</div>
        <div id="container"></div>
        <script type="module">
            import { SpaceGraph } from '../src/index';

            const statusEl = document.getElementById('status');

            try {
                statusEl.textContent = 'Generating 10,000 nodes...';

                const startTime = performance.now();

                const nodes = [];
                const edges = [];

                // We don't want to draw 10,000 edges as that becomes the bottleneck,
                // so we just generate the nodes to demonstrate InstancedMesh performance
                // Note: reduced for CI test stability
                const RENDER_SIZE = 1000;

                for (let i = 0; i < RENDER_SIZE; i++) {
                    // Generate positions in a rough sphere
                    const r = 3000 * Math.cbrt(Math.random());
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);

                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta);
                    const z = r * Math.cos(phi);

                    nodes.push({
                        id: `node-${i}`,
                        type: 'InstancedShapeNode',
                        position: [x, y, z],
                        data: {
                            color: Math.random() * 0xffffff,
                        },
                    });
                }

                statusEl.textContent = `Instantiating graph...`;

                const graph = SpaceGraph.create('#container', { nodes, edges });

                // Update status with FPS loop
                let frames = 0;
                let lastTime = performance.now();

                const updateFPS = () => {
                    frames++;
                    const now = performance.now();
                    if (now - lastTime >= 1000) {
                        const fps = (frames * 1000) / (now - lastTime);
                        statusEl.textContent = `Rendered 10,000 instanced nodes | FPS: ${fps.toFixed(1)}`;
                        frames = 0;
                        lastTime = now;
                    }
                    requestAnimationFrame(updateFPS);
                };

                graph.render();
                updateFPS();
            } catch (error) {
                statusEl.textContent = '✗ Error: ' + error.message;
                statusEl.style.color = '#f00';
                console.error('[Demo] Error:', error);
            }
        </script>
    </body>
</html>
