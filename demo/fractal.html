<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SpaceGraph - Fractal Zoom Demo</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #1a1a2e;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            }

            #app {
                width: 100%;
                height: 100%;
            }

            .loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-size: 18px;
                text-align: center;
            }

            .loading::after {
                content: '...';
                animation: dots 1.5s steps(4, end) infinite;
            }

            @keyframes dots {
                0%,
                100% {
                    content: '';
                }
                25% {
                    content: '.';
                }
                50% {
                    content: '..';
                }
                75% {
                    content: '...';
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <div class="loading">Loading Fractal Demo</div>

        <script type="module">
            import { fractalDemo } from './demos/index.ts';

            // Wait for DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            function init() {
                try {
                    const sg = fractalDemo();
                    window._sg = sg;

                    // Remove loading indicator once ready
                    sg.events.on('fractal:level-change', () => {
                        const loading = document.querySelector('.loading');
                        if (loading) loading.remove();
                    });

                    // Fallback: remove loading after 2 seconds
                    setTimeout(() => {
                        const loading = document.querySelector('.loading');
                        if (loading) loading.remove();
                    }, 2000);
                } catch (error) {
                    console.error('Failed to initialize fractal demo:', error);
                    const loading = document.querySelector('.loading');
                    if (loading) {
                        loading.textContent = 'Error loading demo. Check console.';
                        loading.style.color = '#ff4466';
                    }
                }
            }
        </script>
    </body>
</html>
