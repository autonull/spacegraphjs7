<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Vision Test Fixture</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                    "three/examples/jsm/renderers/CSS3DRenderer.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/CSS3DRenderer.js",
                    "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js",
                    "marked": "https://cdn.jsdelivr.net/npm/marked@12.0.1/lib/marked.esm.js",
                    "mitt": "https://cdn.jsdelivr.net/npm/mitt@3.0.1/dist/mitt.mjs",
                    "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.all.bundle.min.mjs",
                    "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.3/build/index.module.js",
                    "chart.js": "https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.js"
                }
            }
        </script>
</head>

<body>
    <div id="app"></div>
    <!-- Load from cloned dist so analyzer's http-server can serve it -->
    <script type="module">
        import * as THREE from 'three';
        import { SpaceGraph } from './dist/spacegraphjs.js';

        window.THREE = THREE;

        const spec = {
            nodes: [
                // Red background (#ff0000) with default white text has poor contrast (WCAG violation)
                { id: 'n1', type: 'ShapeNode', label: 'Node 1', data: { color: 0xff0000 } },
                { id: 'n2', type: 'ShapeNode', label: 'Node 2', data: { color: 0x00ff00 } },
                { id: 'n3', type: 'ShapeNode', label: 'Node 3', data: { color: 0x0000ff } },
            ],
            edges: [
                { id: 'e1', type: 'Edge', source: 'n1', target: 'n2' },
                { id: 'e2', type: 'Edge', source: 'n2', target: 'n3' },
            ],
        };

        const sg = SpaceGraph.create('#app', spec);

        // Load the ODN, TLA, and CHE inference models for Vision validation
        setTimeout(async () => {
            await sg.vision.loadModels({
                odn: '/dist/odn_model.onnx',
                tla: '/dist/tla_model.onnx',
                che: '/dist/che_model.onnx',
            });
        }, 50);

        // Wait for graph to be ready and layout to apply, then override positions to force overlaps.
        setTimeout(() => {
            const n1 = sg.graph.nodes.get('n1');
            const n2 = sg.graph.nodes.get('n2');
            if (n1 && n2) {
                // Pin them so ForceLayout doesn't move them before vision runs
                n1.data = n1.data || {};
                n2.data = n2.data || {};
                n1.data.pinned = true;
                n2.data.pinned = true;
                // Place them physically overlapping in Frustum bounds
                n1.updatePosition(0, 0, 0);
                n2.updatePosition(5, 5, 0);
            }
        }, 500);

        window.sg = sg;
    </script>
</body>

</html>
