<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision AI Demo - SpaceGraphJS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #0d0d12;
            font-family: system-ui;
            color: white;
        }

        #container {
            width: 100vw;
            height: 100vh;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 4px;
            background: -webkit-linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .nav-link {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="./index.html" class="nav-link">← Back to Gallery</a>
        <h1>Vision-Closed Loop AI</h1>
        <p>Wait for ONNX models to load, then watch the AI detect and fix UI issues.</p>
    </div>
    <div id="container"></div>

    <script type="module">
        import { SpaceGraph, VisionOverlayPlugin } from '../src/index.ts';

        // Generate a graph with intentional issues
        const nodes = [
            // Layout issue: Severe Overlap
            {
                id: 'overlap_a',
                type: 'ShapeNode',
                label: 'Overlapping Node A',
                position: [-100, 100, 0],
                data: { shape: 'box', color: 0xeab308 },
            },
            {
                id: 'overlap_b',
                type: 'ShapeNode',
                label: 'Overlapping Node B',
                position: [-90, 110, 0], // Almost exactly the same position
                data: { shape: 'box', color: 0xf97316 },
            },
            {
                id: 'overlap_c',
                type: 'ShapeNode',
                label: 'Overlapping Node C',
                position: [-110, 90, 0],
                data: { shape: 'box', color: 0xef4444 },
            },

            // Legibility issue: Bad Contrast
            {
                id: 'contrast_bad',
                type: 'ShapeNode',
                label: 'Illegible Text',
                position: [200, 0, 0],
                // Dark background with black text
                data: { shape: 'box', color: 0x111111, textColor: 0x000000 },
            },

            // Fine nodes
            {
                id: 'good_a',
                type: 'ShapeNode',
                label: 'Good Node A',
                position: [0, -150, 0],
                data: { shape: 'sphere', color: 0x3b82f6 },
            },
            {
                id: 'good_b',
                type: 'ShapeNode',
                label: 'Good Node B',
                position: [-200, -100, 0],
                data: { shape: 'box', color: 0x10b981 },
            }
        ];

        const edges = [
            { id: 'e1', source: 'good_a', target: 'overlap_a', type: 'CurvedEdge' },
            { id: 'e2', source: 'good_b', target: 'contrast_bad', type: 'CurvedEdge' },
            { id: 'e3', source: 'overlap_b', target: 'good_a', type: 'Edge' }
        ];

        const sg = SpaceGraph.create('#container', { nodes, edges });

        // Ensure nodes are pinned so they don't auto-resolve before AI sees them
        for (const node of sg.graph.nodes.values()) {
            node.data.pinned = true;
        }

        // Real VisionOverlayPlugin running full ONNX models
        const visionOverlay = new VisionOverlayPlugin();
        sg.pluginManager.add(visionOverlay);

        sg.render();
        sg.fitView(100, 1);
    </script>
</body>

</html>
