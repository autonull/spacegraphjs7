<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Basic Graph - SpaceGraphJS Example</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                overflow: hidden;
                background-color: #1a1a2e;
            }
            #container {
                width: 100vw;
                height: 100vh;
            }
            .status {
                position: absolute;
                top: 10px;
                left: 10px;
                color: #0f0;
                background: rgba(0, 0, 0, 0.8);
                padding: 10px;
                font-family: monospace;
                z-index: 10;
            }
        </style>
    </head>
    <body>
        <div class="status">Basic Graph Example<br/><small style="color: #ccc;">Double-click an edge to fly to its target node!</small></div>
        <div id="container"></div>

        <script type="module">
            import { SpaceGraph } from '../src/index.ts';

            const graph = SpaceGraph.create('#container', {
                nodes: [
                    {
                        id: 'a',
                        type: 'ShapeNode',
                        label: 'Node A',
                        position: [0, 50, 0],
                        data: { color: 0x3366ff },
                    },
                    {
                        id: 'b',
                        type: 'ShapeNode',
                        label: 'Node B',
                        position: [-100, -50, 0],
                        data: { color: 0xff6633 },
                    },
                    {
                        id: 'c',
                        type: 'ShapeNode',
                        label: 'Node C',
                        position: [100, -50, 0],
                        data: { color: 0x33ff66 },
                    },
                ],
                edges: [
                    { id: 'ab', source: 'a', target: 'b', type: 'Edge' },
                    { id: 'bc', source: 'b', target: 'c', type: 'Edge' },
                    { id: 'ca', source: 'c', target: 'a', type: 'Edge' },
                ],
            });

            graph.render();
        </script>
    </body>
</html>
