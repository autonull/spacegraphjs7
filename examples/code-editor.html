<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Editor Nodes - SpaceGraphJS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #spacegraph-container {
            width: 100vw;
            height: 100vh;
        }
        #hud-title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f1f5f9;
            z-index: 10;
            pointer-events: none;
        }
        #hud-title h1 {
            margin: 0;
            font-size: 24px;
        }
        #hud-title p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="hud-title">
        <h1>Code Editor Nodes</h1>
        <p>Monaco editor instances running natively inside the 3D canvas.</p>
    </div>
    <div id="spacegraph-container"></div>

    <script type="module">
        import { SpaceGraph } from '../src/index.ts';

        const initialCode = `// SpaceGraphJS System Application
import { Graph } from 'spacegraphjs';

export function initializeSystem(graph: Graph) {
    console.log("System initializing...");
    const rootNode = graph.addNode({
        id: 'sys-root',
        type: 'ShapeNode',
        label: 'Kernel'
    });

    return rootNode;
}
`;

        const pythonCode = `def fibonacci(n):
    if n <= 0:
        return []
    elif n == 1:
        return [0]

    sequence = [0, 1]
    while len(sequence) < n:
        next_val = sequence[-1] + sequence[-2]
        sequence.append(next_val)

    return sequence

print(fibonacci(10))
`;

        const spec = {
            nodes: [
                {
                    id: 'editor-1',
                    type: 'CodeEditorNode',
                    label: 'SystemKernel.ts',
                    position: [-400, 0, 0],
                    data: {
                        width: 500,
                        height: 350,
                        language: 'typescript',
                        theme: 'vs-dark',
                        code: initialCode
                    }
                },
                {
                    id: 'editor-2',
                    type: 'CodeEditorNode',
                    label: 'algorithm.py',
                    position: [400, 0, 0],
                    data: {
                        width: 450,
                        height: 300,
                        language: 'python',
                        theme: 'vs', // Light theme demo
                        code: pythonCode
                    }
                },
                {
                    id: 'note-1',
                    type: 'NoteNode',
                    label: 'Instructions',
                    position: [0, 250, 0],
                    data: {
                        text: "Both of these editors are fully functional Monaco instances.\nYou can click into them, type, select text, and use keyboard shortcuts.",
                        width: 300,
                        color: '#334155',
                        textColor: '#f1f5f9'
                    }
                }
            ],
            edges: [
                { id: 'e1', source: 'note-1', target: 'editor-1', type: 'CurvedEdge' },
                { id: 'e2', source: 'note-1', target: 'editor-2', type: 'CurvedEdge' }
            ]
        };

        const sg = SpaceGraph.create('#spacegraph-container', spec);
    </script>
</body>
</html>
