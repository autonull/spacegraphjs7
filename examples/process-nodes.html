<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessNode System Monitor - SpaceGraphJS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: sans-serif; }
        #spacegraph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        p { margin: 5px 0 0; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h1>System Processes Monitor (FZUI Concept)</h1>
        <p>Dynamic FZUI layout scaling node dimensions based on RAM usage.</p>
    </div>
    <div id="spacegraph-container"></div>
    <script type="module">
        import { SpaceGraph } from '../src/index.ts';

        const sg = SpaceGraph.create('#spacegraph-container', {
            nodes: [
                { id: 'p1', type: 'ProcessNode', position: [-300, 150, 0], data: { pid: '1', name: 'systemd', cpu: 1.2, memory: 5.5 } },
                { id: 'p2', type: 'ProcessNode', position: [0, 150, 0], data: { pid: '412', name: 'docker', cpu: 12.0, memory: 45.2 } },
                { id: 'p3', type: 'ProcessNode', position: [300, 150, 0], data: { pid: '811', name: 'node', cpu: 85.5, memory: 89.9 } },
                { id: 'p4', type: 'ProcessNode', position: [-150, -100, 0], data: { pid: '921', name: 'postgres', cpu: 4.1, memory: 33.1 } },
                { id: 'p5', type: 'ProcessNode', position: [150, -100, 0], data: { pid: '1104', name: 'nginx', cpu: 0.5, memory: 10.0 } }
            ]
        });

        // Simulate dynamic telemetry FZUI
        setInterval(() => {
            sg.update({
                nodes: [
                    { id: 'p3', data: { cpu: 80 + Math.random() * 15, memory: 85 + Math.random() * 10 } },
                    { id: 'p2', data: { cpu: 10 + Math.random() * 5, memory: 40 + Math.random() * 10 } },
                    { id: 'p4', data: { cpu: 2 + Math.random() * 5, memory: 30 + Math.random() * 5 } }
                ]
            });
        }, 1000);
    </script>
</body>
</html>
