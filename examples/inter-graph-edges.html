<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceGraphJS - Inter-graph Edges</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
        }

        #container-left,
        #container-right {
            flex: 1;
            height: 100%;
            position: relative;
            border-right: 1px solid #333;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="container-left">
        <div class="controls">Canvas 1</div>
    </div>
    <div id="container-right">
        <div class="controls">Canvas 2</div>
    </div>

    <script type="module">
        import { SpaceGraph } from '../src/index.ts';

        const graph1 = SpaceGraph.create('#container-left', {
            nodes: [
                { id: 'node1', type: 'ShapeNode', label: 'Node 1', position: [-50, 0, 0], data: { shape: 'box', color: 0x44aa88 } },
                { id: 'node2', type: 'ShapeNode', label: 'Node 2', position: [50, 0, 0], data: { shape: 'box', color: 0x44aa88 } }
            ],
            edges: [
                { id: 'e1', source: 'node1', target: 'node2', type: 'Edge' }
            ]
        });

        const graph2 = SpaceGraph.create('#container-right', {
            nodes: [
                { id: 'node3', type: 'ShapeNode', label: 'Node 3', position: [-50, 0, 0], data: { shape: 'sphere', color: 0xaa4488 } },
                { id: 'node4', type: 'ShapeNode', label: 'Node 4', position: [50, 0, 0], data: { shape: 'sphere', color: 0xaa4488 } }
            ],
            edges: [
                { id: 'e2', source: 'node3', target: 'node4', type: 'Edge' }
            ]
        });

        // Add inter-graph edge programmatically once both graphs are loaded
        setTimeout(() => {
             graph1.graph.addEdge({
                  id: 'inter1',
                  source: 'node2',
                  target: 'node3',
                  type: 'Edge', // It will automatically become an InterGraphEdge
                  data: { color: 0xffff00 }
             });
        }, 500);

    </script>
</body>

</html>
