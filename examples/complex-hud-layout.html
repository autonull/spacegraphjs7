<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complex HUD & Layout - SpaceGraphJS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #050510;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
        }

        #container {
            width: 100vw;
            height: 100vh;
        }

        /* Custom styling for injected HtmlNodes to test dynamic CSS classes */
        .my-custom-node {
            background: rgba(30, 41, 59, 0.9) !important;
            border: 1px solid rgba(148, 163, 184, 0.3) !important;
            border-radius: 12px !important;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .my-custom-node:hover {
            border-color: rgba(139, 92, 246, 0.8) !important;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3) !important;
            z-index: 100 !important;
        }

        .my-custom-node.selected {
            border: 2px solid #a855f7 !important;
            background: rgba(88, 28, 135, 0.8) !important;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5) !important;
        }

        .node-header {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            padding: 8px 12px;
            border-radius: 10px 10px 0 0;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .node-content {
            padding: 12px;
            font-size: 13px;
            color: #cbd5e1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .node-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 6px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .stat-val {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 12px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div id="container"></div>

    <script type="module">
        import { SpaceGraphApp } from '../src/index.ts';

        const NUM_NODES = 20;
        const nodes = [];
        const edges = [];

        // Generate complex HTML nodes
        for (let i = 0; i < NUM_NODES; i++) {
            const cpu = Math.floor(Math.random() * 100);
            const mem = Math.floor(Math.random() * 8000 + 500);
            const statusColor = cpu > 80 ? '#ef4444' : cpu > 50 ? '#eab308' : '#22c55e';

            nodes.push({
                id: `server-${i}`,
                type: 'HtmlNode',
                position: [
                    Math.random() * 1200 - 600,
                    Math.random() * 1200 - 600,
                    Math.random() * 400 - 200
                ],
                data: {
                    className: 'my-custom-node',
                    width: 240,
                    height: 160,
                    pointerEvents: 'auto',
                    html: `
                        <div style="width: 100%; height: 100%; display: flex; flex-direction: column;">
                            <div class="node-header">
                                <span>Server ${i.toString().padStart(3, '0')}</span>
                                <div style="width: 8px; height: 8px; border-radius: 50%; background: ${statusColor};"></div>
                            </div>
                            <div class="node-content">
                                <div>Status: <strong>Active</strong></div>
                                <div class="node-stats">
                                    <div class="stat-box">
                                        <span class="stat-label">CPU Load</span>
                                        <span class="stat-val" style="color: ${statusColor}">${cpu}%</span>
                                    </div>
                                    <div class="stat-box">
                                        <span class="stat-label">Memory</span>
                                        <span class="stat-val">${mem} MB</span>
                                    </div>
                                </div>
                                <div style="display: flex; gap: 8px; margin-top: auto;">
                                    <button class="action-btn" style="flex: 1;" onclick="console.log('Rebooting server ${i}')">Reboot</button>
                                    <button class="action-btn" style="flex: 1;" onclick="console.log('Logs for server ${i}')">Logs</button>
                                </div>
                            </div>
                        </div>
                    `
                }
            });
        }

        // Randomly connect some servers
        for (let i = 0; i < NUM_NODES; i++) {
            const numEdges = Math.floor(Math.random() * 3) + 1;
            for (let e = 0; e < numEdges; e++) {
                const target = Math.floor(Math.random() * NUM_NODES);
                if (target !== i) {
                    edges.push({
                        id: `e-${i}-${target}`,
                        source: `server-${i}`,
                        target: `server-${target}`,
                        type: 'AnimatedEdge',
                        data: { color: 0x8b5cf6, opacity: 0.5, speed: Math.random() * 2 + 0.5 }
                    });
                }
            }
        }

        const app = new SpaceGraphApp('#container', {
            spec: { nodes, edges },
            title: 'Server Topology',
            description: 'Hold <strong>Shift + Drag</strong> to box select nodes. Double-click a node to fly to it.',
            selectionHighlightClass: 'selected',
            theme: {
                primaryColor: '#3b82f6',
                secondaryColor: '#8b5cf6'
            },
            onNodeSelect: (selectedNodes) => {
                if (selectedNodes.length > 0) {
                    app.showAlert(`Selected ${selectedNodes.length} nodes`);
                }
            }
        });

        const sg = app.sg;

        // Force layout for organic clustering
        const layout = sg.pluginManager.getPlugin('ForceLayout');
        if (layout) {
            layout.settings.attraction = 0.08;
            layout.settings.repulsion = 150000;
            layout.settings.enabled = true;
        }

        sg.render();
        setTimeout(() => sg.fitView(200), 500);

    </script>
</body>

</html>
