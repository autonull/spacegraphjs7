<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceGraphJS - Benchmark</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
        }

        #container {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
        }

        #fps-counter {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <div class="controls">
        <h3>Benchmark (1000 Nodes)</h3>
        <div>FPS: <span id="fps-counter">Calculating...</span></div>
    </div>

    <script type="module">
        import { SpaceGraph } from '../src/index.ts';

        const nodes = [];
        const edges = [];

        // Generate 1000 nodes in a grid/sphere layout
        const gridSize = 10;
        const spacing = 150;

        for (let i = 0; i < 1000; i++) {
            const x = (Math.random() - 0.5) * 4000;
            const y = (Math.random() - 0.5) * 4000;
            const z = (Math.random() - 0.5) * 4000;

            nodes.push({
                id: `node-${i}`,
                type: 'ShapeNode',
                position: [x, y, z],
                data: {
                    shape: i % 2 === 0 ? 'box' : 'sphere',
                    color: Math.random() * 0xffffff,
                    size: 20 + Math.random() * 20
                }
            });

            // Connect to a previous random node to create a network
            if (i > 0) {
                const targetIdx = Math.floor(Math.random() * i);
                edges.push({
                    id: `edge-${i}`,
                    source: `node-${i}`,
                    target: `node-${targetIdx}`,
                    type: 'Edge'
                });
            }
        }

        const graph = SpaceGraph.create('#container', {
            nodes,
            edges
        });

        graph.cameraControls.spherical.radius = 4000;

        let frameCount = 0;
        let lastTime = performance.now();
        const fpsCounter = document.getElementById('fps-counter');

        const measureFps = () => {
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                const fps = Math.round((frameCount * 1000) / (currentTime - lastTime));
                fpsCounter.textContent = fps;
                window.__benchmark_fps = fps; // For Playwright to read
                frameCount = 0;
                lastTime = currentTime;
            }
            requestAnimationFrame(measureFps);

            // Auto rotate to simulate load
            graph.cameraControls.spherical.theta += 0.005;
        };

        requestAnimationFrame(measureFps);
    </script>
</body>

</html>
