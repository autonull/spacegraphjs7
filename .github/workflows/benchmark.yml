name: SpaceGraphJS CI Benchmark & Vision Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Library
      run: npm run build

    - name: Bundle Size Audit
      run: node verification/check-bundle-size.mjs

    - name: Run Unit Tests
      run: npm run test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Vision Gate (Playwright E2E)
      run: npm run test:vision
